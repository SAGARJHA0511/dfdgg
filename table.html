<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tag</title>
</head>
<body>
    <table border="1">
        <caption>Data For Orgnization</caption>
        <tr>
            <th>Name</th>
            <th>Id</th>
            <th>Email</th>
        </tr>
       
        <tr>
            <td>Chiku</td>
            <td>#9090</td>

        </tr>
         <tr>
            <th colspan="3">Get the another data</th>
        </tr>
        <tr>
            <td>Lala</td>
            <td>#9060</td>

        </tr>
    </table>
    <br><hr>
   <table border="1">
    <thead>Create Tables In HTML</thead>
    <tr>
       <td>Columu 1</td>
       <td>Columu 2</td>
       <td>Columu 3</td> 
    </tr>
    <tr>
        <td rowspan="2">Row 1 Cell 1</td>
        <td>Row 1 Cell 2</td>
        <td>Row 1 Cell 3</td>
    </tr>
    <tr>
        <td>Row 2 Cell 2</td>
        <td>Row 2 Cell 3</td>
    </tr>
    <tr>
        <td colspan="3">Row 3 Cell 1</td>
    </tr>
   </table>
</body>
</html>
