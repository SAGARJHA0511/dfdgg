<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heading Tag</title>
</head>
<body>
    <h1>Heading 1 *Most important heading (usually one per page)*</h1>
    <h2>Heading 2 *Major section*</h2>
    <h3>Heading 3 *Subsection*</h3>
    <h4>heading 4 *Deeper levels of headings*</h4>
    <h5>Heading 5 *Deeper levels of headings*</h5>
    <h6>Heading 6 *Deeper levels of headings*</h6>
</body>
</html>
