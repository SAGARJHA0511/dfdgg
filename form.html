<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Form</h1>
    <form>
        Username :- <input type="text" placeholder="Username:">
        <br>
        Password :- <input type="password" placeholder="Password:">
        <br><br>
        <input type="submit">
    </form><br><br><br><hr>

    <u>Registration Form</u><br><br>

    <form>
        First Name <input type="text" ><br>
        Last Name  <input type="text"><br>
        Nick Name  <input type="text"><br>
        e-mail     <input type="email"><br>
        Password   <input type="password"><br>
        Date Of Birth <input type="date"><br>
        Gender <input type="radio"> Male <input type="radio">Female <input type="radio">Others <br>
        Mobile <input type="number"><br>
        Address <input type="text"><br>
        <input type="submit"> <input type="reset">
    </form>

    <br><br><hr>
    <form action="/submit">
        <input type="text" name="username" value="chiku">
    </form><br><br><hr>

    <form>
        <label for="username">UserName :</label>
        <input type="text" id="username" name="username"><br><br>
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Password :</label>
        <input type="password" id="password" name="password">
        <input type="submit">
    </form>

    <br>
    <form>
  <label>
    Choose your preferred party date (required, April 1st to 20th):
    <input
      type="date"
      name="party"
      min="2017-04-01"
      max="2017-04-21"
      required />
    <span class="validity"></span>
  </label>

  <p>
    <button>Submit</button>
  </p>
  <br><br>
  <label for="Male">Male</label>
  <input type="radio" id="Male" name="gender">
  <br>
  <label for="female">Female</label>
  <input type="radio" id="female" name="gender">
  <br>
  <label for="other">Other</label>
  <input type="radio" id="other" name="gender">
</form>
</body>
</html>
