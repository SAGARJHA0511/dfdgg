<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Register Your ID:</h1>
    <form action="/database">
        <label for="Username">Username :</label>
        <input type="text" id="Username" value=""><br><br>
        <label for="Email">Email :</label>
        <input type="email" id="Email" value=""><br><br>
        <label for="Password">Password :</label>
        <input type="password" id="Password" value=""><br><br>
        <label for="Mobile">Mobile :</label>
        <input type="tel" id="Mobile" value=""><br><br>
        <label for="Male">Male :</label>
        <input type="radio" id="Male" name="Gender">
        <label for="Female">Female :</label>
        <input type="radio" id="Female" name="Gender"><br><br>
        <input type="submit">
    </form>
    <br><br><hr>
    <form action="">
        <caption>CheckBox</caption><br>
        <label for="Python">Python</label>
        <input type="checkbox" id="Python" name="lang" value="Python"><br>
        <label for="Java">Java</label>
        <input type="checkbox" id="Java" name="lang" value="Java">
    </form>
    <br><br><hr>
    <form action="">
        <label for="Lang">Select any Lang</label>
        <select name="Lang" id="Lang">
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JS">JS</option>
            <option value="React">REACT</option>
        </select>
        <label for="course">Choose a Course:</label>

<select id="course" name="course">
    <option value="html">HTML</option>
    <option value="css">CSS</option>
    <option value="js">JavaScript</option>
    <option value="react">React</option>
</select>
    </form>
    <br><br><hr>
    <form action="">
        <label for="Message">Give your suggetion</label>
        <textarea name="Suggetion" id="Message"></textarea>
    </form>
    
</body>
</html>
