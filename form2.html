<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Register Your ID:</h1>
    <form action="/database">
        <label for="Username">Username :</label>
        <input type="text" id="Username" value=""><br><br>
        <label for="Email">Email :</label>
        <input type="email" id="Email" value=""><br><br>
        <label for="Password">Password :</label>
        <input type="password" id="Password" value=""><br><br>
        <label for="Mobile">Mobile :</label>
        <input type="tel" id="Mobile" value=""><br><br>
        <label for="Male">Male :</label>
        <input type="radio" id="Male" name="Gender">
        <label for="Female">Female :</label>
        <input type="radio" id="Female" name="Gender"><br><br>
        <input type="submit">
    </form>
</body>
</html>
